<div class="modal-backdrop" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="onClose()">✕</button>

    <h2>{{ 'CONTACT_MODAL.TITLE' | translate }}</h2>
    <p class="subtitle">{{ 'CONTACT_MODAL.SUBTITLE' | translate }}</p>

    <div class="contact-options">
      <button class="contact-btn email-copy" (click)="copyEmail()">
        pabloggm00@gmail.com
        <img [src]="copied ? 'icons/for_projects/tick.webp' : 'icons/for_projects/copy.webp'" [class.copied]="copied"
          class="copy-icon" />
      </button>
      <a [href]="emailDefault" class="contact-btn email" target="_blank">{{ 'CONTACT_MODAL.DEFAULT_EMAIL' | translate }}</a>
      <a [href]="emailGmail" class="contact-btn gmail" target="_blank">{{ 'CONTACT_MODAL.GMAIL' | translate }}</a>
      <a [href]="whatsappUrl" target="_blank" class="contact-btn whatsapp">{{ 'CONTACT_MODAL.WHATSAPP' | translate }}</a>
      <div class="contact-btn qr">
        <img src="qr/qr.webp" [alt]="'CONTACT_MODAL.SCAN_QR' | translate" />
      </div>
    </div>
  </div>
</div>
