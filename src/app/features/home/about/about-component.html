<div #aboutContainer class="about-container">
  <img src="profile/profile2.webp" alt="Pablo Gonzalez" class="profile-pic" />
  
  <h1>{{ 'ABOUT.HI' | translate }} <a [routerLink]="['/aboutme']"><span class="name">{{ 'ABOUT.NAME' | translate }}</span></a>!</h1>
  <h2>{{ 'ABOUT.ROLE' | translate }}</h2>
  
  <p class="about-text">
    {{ 'ABOUT.DESCRIPTION' | translate }}<br>
    {{ 'ABOUT.DESCRIPTION2' | translate }}
  </p>

  <div class="buttons">
    <a [href]="cvUrl" download class="btn primary-btn" (click)="buttonDownload($event)">{{ 'ABOUT.DOWNLOAD_CV' | translate }}</a>
    <button (click)="openContact()" #contactBtn class="btn secondary-btn">{{ 'ABOUT.CONTACT_ME' | translate }}</button>
  </div>

  <div class="social-buttons">
    <a [href]="githubUrl" target="_blank" class="social-btn github"><img src="icons/for_projects/github.svg"></a>
    <a [href]="linkedinUrl" target="_blank" class="social-btn linkedin">in</a>
  </div>
</div>
