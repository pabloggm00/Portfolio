<div class="featured-card">

  <!-- Carrusel -->
  <div class="carousel">
    <div class="carousel-track" [style.transform]="'translateX(-' + currentIndex() * 100 + '%)'">
      <div
        *ngFor="let img of images; let i = index"
        class="carousel-img-wrapper"
        (click)="openLightbox(currentIndex())">
        <img [src]="img" [alt]="project.title" class="carousel-img" />
        <div class="img-overlay">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
      </div>
    </div>

    <button *ngIf="total > 1" class="carousel-btn prev" (click)="prev()">&#8249;</button>
    <button *ngIf="total > 1" class="carousel-btn next" (click)="next()">&#8250;</button>

    <div *ngIf="total > 1" class="carousel-dots">
      <button
        *ngFor="let img of images; let i = index"
        class="dot"
        [class.active]="currentIndex() === i"
        (click)="goTo(i)">
      </button>
    </div>
  </div>

  <!-- Info -->
  <div class="featured-info">
    <h3>{{ project.title }}</h3>
    <p>{{ project.description }}</p>

    <div class="featured-techs" *ngIf="project.techs?.length">
      <span
        *ngFor="let tech of project.techs"
        class="tech-pill"
        [ngStyle]="{'background-color': tech.color}">
        {{ tech.name }}
      </span>
    </div>

    <div class="featured-footer">
      <div class="footer-left">
        <a *ngIf="project.googlePlayUrl" [href]="project.googlePlayUrl" target="_blank" rel="noopener noreferrer" class="gplay-badge">
          <img src="icons/for_projects/googleplay.svg" alt="Google Play" class="gplay-badge-icon" />
          <span class="gplay-badge-text">
            <small>{{ 'BADGES.AVAILABLE_ON' | translate }}</small>
            {{ 'BADGES.GOOGLE_PLAY' | translate }}
          </span>
        </a>

        <a *ngIf="project.steamUrl" [href]="project.steamUrl" target="_blank" rel="noopener noreferrer" class="steam-badge">
          <img src="icons/for_projects/steam.svg" alt="Steam" class="steam-badge-icon" />
          <span class="steam-badge-text">
            <small>{{ 'BADGES.AVAILABLE_ON' | translate }}</small>
            {{ 'BADGES.STEAM' | translate }}
          </span>
        </a>

        <div class="project-icons" *ngIf="project.icons?.length">
        <a
          *ngFor="let icon of project.icons"
          [href]="icon.url"
          target="_blank"
          rel="noopener noreferrer"
          class="icon-link"
          [title]="icon.name">
          <img [src]="icon.iconSrc" [alt]="icon.name" class="project-icon-img" />
        </a>
      </div>      </div>
      <span *ngIf="project.state" class="project-state" [ngStyle]="{'color': project.state.color}">
        {{ project.state.name | translate }}
      </span>
    </div>
  </div>

</div>
